<div class="contextMenuDiv" dashboard-context-menu>
	<button class="contextMenuButton" title="%TEXT_deleteReply%" type="button" onclick="postPage('manage/deleteReply', 'reply%MENU_ID%', 'settings')" dashboard-show="%MENU_CAN_DELETE%">
		<i class="fa-solid fa-trash"></i>
		<text>%TEXT_deleteReply%</text>
	</button>
	
	<button class="contextMenuButton" title="%TEXT_reportReply%" type="button" dashboard-modal-button="reportModal" dashboard-modal-name="replyID" dashboard-modal-value="%MENU_ID%" dashboard-show="%IS_LOGGED_IN%">
		<i class="fa-solid fa-flag"></i>
		<text>%TEXT_reportReply%</text>
	</button>

	<hr dashboard-show="%MENU_CAN_BAN%">
	
	<button class="contextMenuButton" title="%TEXT_banPerson%" type="button" href="profile/%MENU_NAME%/ban" dashboard-loader-type="settings" dashboard-show="%MENU_CAN_BAN%" style="--button-color: #ff9999;">
		<i class="fa-solid fa-gavel"></i>
		<text>%TEXT_banPerson%</text>
	</button>

	<hr dashboard-show="%MENU_SHOW_CONTEXT%">
	
	<button class="contextMenuButton" title="%TEXT_copyReplyID%" type="button" onclick="copyElementContent('%MENU_ID%')">
		<i class="fa-solid fa-comment"></i>
		<text>%TEXT_copyReplyID%</text>
	</button>
</div>
