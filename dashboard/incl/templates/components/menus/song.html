<div class="contextMenuDiv" dashboard-context-menu>
	<button class="contextMenuButton" title="%TEXT_editSong%" type="button" href="browse/songs/%MENU_ID%/manage" dashboard-loader-type="box" dashboard-show="%MENU_CAN_CHANGE%">
		<i class="fa-solid fa-pencil"></i>
		<text>%TEXT_editSong%</text>
	</button>
	
	<button class="contextMenuButton" title="%TEXT_deleteSong%" type="button" href="browse/songs/%MENU_ID%/delete" dashboard-loader-type="box" dashboard-show="%MENU_CAN_CHANGE%">
		<i class="fa-solid fa-trash"></i>
		<text>%TEXT_deleteSong%</text>
	</button>
	
	<button class="contextMenuButton" title="%TEXT_reportSong%" type="button" dashboard-modal-button="reportModal" dashboard-modal-name="songID" dashboard-modal-value="%MENU_ID%" dashboard-show="%IS_LOGGED_IN%">
		<i class="fa-solid fa-flag"></i>
		<text>%TEXT_reportSong%</text>
	</button>

	<hr dashboard-show="%MENU_CAN_BAN%">
	
	<button class="contextMenuButton" title="%TEXT_banPerson%" type="button" href="profile/%MENU_NAME%/ban" dashboard-loader-type="settings" dashboard-show="%MENU_CAN_BAN%" style="--button-color: #ff9999;">
		<i class="fa-solid fa-gavel"></i>
		<text>%TEXT_banPerson%</text>
	</button>

	<hr dashboard-show="%MENU_SHOW_CONTEXT%">
	
	<button class="contextMenuButton" title="%TEXT_downloadSong%" type="button" onclick="downloadSong('%MENU_SONG_AUTHOR%', '%MENU_SONG_NAME%', '%MENU_SONG_URL%')">
		<i class="fa-solid fa-arrow-down"></i>
		<text>%TEXT_downloadSong%</text>
	</button>
	
	<button class="contextMenuButton" title="%TEXT_copySongID%" type="button" onclick="copyElementContent('%MENU_ID%')">
		<i class="fa-solid fa-music"></i>
		<text>%TEXT_copySongID%</text>
	</button>
</div>
